# AgentGo v4 配置文件示例
# 将此文件复制为 config.yaml 并根据需要自定义
#
# v4 唯一受支持的格式：嵌套 schema（llm: / tool_profiles: / scheduler: / agents: / infra:）
# 旧 v3 顶层字段（如 worker_count / llm_base_url / agent_max_loops 等）在解析时会被忽略。
# 详见 docs/activate/nextUpgrade_v4.md §11.3

# ============================================================
# LLM 默认基础设施（per-kind 可通过 agents[*].model 覆盖）
# ============================================================
llm:
  base_url: https://api.openai.com/v1
  api_key: ${OPENAI_API_KEY}       # 支持 ${ENV_VAR} 环境变量替换
  default_model: gpt-4o
  timeout_sec: 120
  # provider: openai                # 可选：openai / deepseek-v4 / deepseek-r1

# ============================================================
# 工具集白名单（命名复用层）
# ============================================================
# 每个 kind 块二选一：profile 引用本表 / tools 直接列工具名。
tool_profiles:
  worker_standard:
    - read_file
    - list_dir
    - grep_search
    - glob_search
    - write_file
    - edit_file
    - run_shell
    - web_search
    - web_fetch
    - publish_task
    - send_message

  explorer_full:
    - read_file
    - list_dir
    - grep_search
    - glob_search
    - web_search
    - web_fetch
    - send_message

# ============================================================
# Scheduler 配置（独立块，仅允许 model 字段外部覆盖）
# ============================================================
scheduler:
  model: gpt-4o                    # 可选，缺省回落 llm.default_model

# ============================================================
# Agent kind 列表（核心：kind × replicas，完全同质）
# ============================================================
agents:
  - kind: worker
    replicas: 1
    event_type: ""                 # 默认任务队列（空字符串）
    profile: worker_standard       # 引用 tool_profiles 中的白名单
    # 或直接用 tools: [read_file, write_file, ...]  二选一，不能同时给
    model: gpt-4o                  # 覆盖 llm.default_model
    system_prompt_file: prompts/worker.md
    agent_max_loops: 10
    task_max_retries: 3
    enforce_compact_token_threshold: 4000
    context_limit: 16000

  - kind: explorer
    replicas: 1
    event_type: explore
    profile: explorer_full
    model: gpt-4o-mini             # 调查类可用更便宜模型
    system_prompt_file: prompts/explorer.md
    agent_max_loops: 5
    task_max_retries: 3
    enforce_compact_token_threshold: 3000
    context_limit: 8000

# ============================================================
# 运行时基础设施
# ============================================================
project_root: "."

infra:
  watchdog:
    interval_sec: 30
  mail_notifier:
    enabled: true
    interval_sec: 5
  store:
    event_channel_buffer: 64
    fifo_limit: 100
    default_concurrency: 2
    default_timeout_sec: 300
  roster:
    wait_timeout_sec: 30

# ============================================================
# 启动期可观测性（§9.5）
# ============================================================
startup_probe: "tcp"               # "tcp"=DialTimeout 探测; "off"=跳过
startup_probe_timeout_sec: 5
startup_probe_failure_action: "warn"  # "warn"=仅警告继续; "exit"=失败硬退出

# ============================================================
# 杂项
# ============================================================
max_subtask_depth: 3
shell_timeout_sec: 60
shell_blacklist: []
shell_greylist: []
search_api_provider: duckduckgo_html
search_api_url: ""
search_api_key: ""

# §7 Hashline 行哈希增强（默认 true）
# hashline_enabled: true

